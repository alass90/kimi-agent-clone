version: '3.8'

services:
  agent:
    build: .
    container_name: kimi-agent-clone
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./skills:/app/skills
      - ./static:/app/static
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - E2B_API_KEY=${E2B_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1-mini}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - DEFAULT_MODE=ok_computer
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
